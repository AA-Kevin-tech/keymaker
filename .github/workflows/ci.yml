name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: keymaker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d keymaker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Run migrations
        run: pnpm --filter api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/keymaker_test

      - name: Build
        run: pnpm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/keymaker_test
          JWT_SECRET: "ci-jwt-secret-min-32-characters-long"

      - name: Lint
        run: pnpm run lint

      - name: Test API
        run: pnpm --filter api run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/keymaker_test
          JWT_SECRET: "ci-jwt-secret-min-32-characters-long"
